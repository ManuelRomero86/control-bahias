<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatus de Bahía</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 85%; }
        #statusBox { padding: 30px; color: white; font-weight: bold; font-size: 28px; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="bahiaNombre">Cargando...</h1>
        <div id="statusBox">Cargando estatus...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id'); 
        document.getElementById('bahiaNombre').innerText = "Bahía: " + id;

        fetch('estatus.json')
            .then(response => response.json())
            .then(data => {
                const info = data[id];
                const box = document.getElementById('statusBox');
                box.innerText = info.estatus;
                box.style.backgroundColor = info.color;
            })
            .catch(() => {
                document.getElementById('statusBox').innerText = "Error: Datos no encontrados";
            });
    </script>
</body>
</html>
