<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Bahía</title>
</head>
<body>
    <h1 id="bahiaNombre">Cargando...</h1>
    <div id="statusBox">Cargando...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        document.getElementById('bahiaNombre').innerText = "Bahía " + id;

        // Versión directa sin caché forzada
        fetch('estatus.json')
            .then(response => response.json())
            .then(data => {
                const info = data[id];
                if(info) {
                    document.getElementById('statusBox').innerText = info.estatus;
                } else {
                    document.getElementById('statusBox').innerText = "Error: ID no encontrado en JSON";
                }
            })
            .catch(err => {
                document.getElementById('statusBox').innerText = "Error cargando archivo JSON";
            });
    </script>
</body>
</html>
